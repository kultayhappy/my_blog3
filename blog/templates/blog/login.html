{% extends 'blog/base.html' %} {% block title %}Вход - Мой Блог{% endblock %} {%
block content %}
<div
  class="login-form"
  style="background: #fff; padding: 30px; border-radius: 5px; max-width: 400px; margin: 40px auto;"
>
  <h2 style="text-align: center; margin-bottom: 25px;">🔐 Вход</h2>

  <form method="post">
    {% csrf_token %} {% if form.errors %}
    <div
      style="background: #f8d7da; color: #721c24; padding: 15px; border-radius: 3px; margin-bottom: 20px;"
    >
      ⚠️ Неверное имя или пароль
    </div>
    {% endif %}

    <div class="form-group">
      <label for="id_username">Имя пользователя:</label>
      <input
        type="text"
        name="username"
        id="id_username"
        required
        autofocus
        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 3px;"
      />
    </div>

    <div class="form-group">
      <label for="id_password">Пароль:</label>
      <input
        type="password"
        name="password"
        id="id_password"
        required
        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 3px;"
      />
    </div>

    {% if next %}
    <input type="hidden" name="next" value="{{ next }}" />
    {% endif %}

    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">
      Войти
    </button>
  </form>
</div>
{% endblock %}
